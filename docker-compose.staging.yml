name: qalam-platform-staging

# Staging stack — runs side-by-side with the prod stack on the same VPS.
# Bring up with:  docker compose -f docker-compose.staging.yml -p qalam-staging up -d --build
#
# Differences vs docker-compose.prod.yml:
#   - ASPNETCORE_ENVIRONMENT=Staging
#   - MIGRATE_ON_STARTUP=true (acceptable for staging)
#   - SEED_DEFAULT_ADMIN=true (staging always has the demo admin)
#   - Host ports shifted (8081 for API, 15772/5772 for RabbitMQ if mapped) to avoid colliding with prod.
#   - Container names prefixed with `staging-`.
#   - Volumes prefixed (staging_rabbitmq_data, staging_app_logs).

services:
  # RabbitMQ Message Broker (staging)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: qalam-staging-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-qalam}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    # No ports exposed to host — only accessible within Docker network.
    volumes:
      - staging_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - qalam-staging-network
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Messaging API (staging)
  messaging-api:
    build:
      context: .
      dockerfile: Qalam.MessagingApi/Dockerfile
    image: qalam-messaging-api:staging
    container_name: qalam-staging-messaging-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__MessagingDb=${MESSAGING_DB_CONNECTION_STRING}
      - RabbitMQSettings__HostName=rabbitmq
      - RabbitMQSettings__Port=5672
      - RabbitMQSettings__UserName=${RABBITMQ_USER:-qalam}
      - RabbitMQSettings__Password=${RABBITMQ_PASS}
      - RabbitMQSettings__VirtualHost=/
      - RabbitMQSettings__EmailQueueName=email-queue
      - RabbitMQSettings__SmsQueueName=sms-queue
      - RabbitMQSettings__PushQueueName=push-queue
      - RabbitMQSettings__TeacherDocUploadQueueName=teacher-doc-upload-queue
      - RabbitMQSettings__ProfilePicUploadQueueName=profile-pic-upload-queue
      - EmailSettings__Host=${EMAIL_HOST}
      - EmailSettings__Port=${EMAIL_PORT:-587}
      - EmailSettings__FromName=${EMAIL_FROM_NAME}
      - EmailSettings__FromEmail=${EMAIL_FROM_EMAIL}
      - EmailSettings__UserName=${EMAIL_USERNAME}
      - EmailSettings__Password=${EMAIL_PASSWORD}
      - EmailSettings__EnableSsl=true
      - EmailSettings__DefaultStrategy=Direct
      - SmsSettings__AccountSid=${TWILIO_ACCOUNT_SID:-}
      - SmsSettings__AuthToken=${TWILIO_AUTH_TOKEN:-}
      - SmsSettings__FromNumber=${TWILIO_FROM_NUMBER:-}
      - PushNotificationSettings__ServiceAccountKeyPath=${FIREBASE_KEY_PATH:-}
      - PushNotificationSettings__ProjectId=${FIREBASE_PROJECT_ID:-}
      - WasabiSettings__AccessKey=${WASABI_ACCESS_KEY:-}
      - WasabiSettings__SecretKey=${WASABI_SECRET_KEY:-}
      - WasabiSettings__BucketName=${WASABI_BUCKET:-qalam-storage-staging}
      - WasabiSettings__Region=${WASABI_REGION:-ap-southeast-1}
      - WasabiSettings__ServiceUrl=${WASABI_SERVICE_URL:-https://s3.ap-southeast-1.wasabisys.com}
    # No ports exposed — internal only.
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - qalam-staging-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/messaging/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      # First boot on Express runs EF migrations + connects to RabbitMQ; cold-start takes 60-120s.
      start_period: 120s

  # Qalam Backend API (staging)
  qalam-api:
    build:
      context: .
      dockerfile: Qalam.Api/Dockerfile
    image: qalam-backend-api:staging
    container_name: qalam-staging-backend-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__dbcontext=${DB_CONNECTION_STRING}
      # Staging applies migrations on startup — acceptable since data is non-prod.
      - MIGRATE_ON_STARTUP=${MIGRATE_ON_STARTUP:-true}
      - SEED_DEFAULT_ADMIN=${SEED_DEFAULT_ADMIN:-true}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@staging.qalam.net.sa}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - EncryptionSettings__Key=${ENCRYPTION_KEY}
      - jwtSettings__Secret=${JWT_SECRET}
      - jwtSettings__Issuer=${JWT_ISSUER:-QalamProject}
      - jwtSettings__Audience=${JWT_AUDIENCE:-QalamProjectUsers}
      - jwtSettings__AccessTokenExpireDate=60
      - jwtSettings__RefreshTokenExpireDate=43200
      - jwtSettings__ValidateIssuer=true
      - jwtSettings__ValidateAudience=true
      - jwtSettings__ValidateLifeTime=true
      - jwtSettings__ValidateIssuerSigningKey=true
      - MessagingApi__BaseUrl=http://messaging-api
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS}
      - RabbitMQSettings__HostName=rabbitmq
      - RabbitMQSettings__Port=5672
      - RabbitMQSettings__UserName=${RABBITMQ_USER:-qalam}
      - RabbitMQSettings__Password=${RABBITMQ_PASS}
      - RabbitMQSettings__VirtualHost=/
      - RabbitMQSettings__EmailQueueName=email-queue
      - RabbitMQSettings__SmsQueueName=sms-queue
      - RabbitMQSettings__PushQueueName=push-queue
      - RabbitMQSettings__TeacherDocUploadQueueName=teacher-doc-upload-queue
      - RabbitMQSettings__ProfilePicUploadQueueName=profile-pic-upload-queue
      - EmailSettings__Host=${EMAIL_HOST}
      - EmailSettings__Port=${EMAIL_PORT:-587}
      - EmailSettings__FromName=${EMAIL_FROM_NAME}
      - EmailSettings__FromEmail=${EMAIL_FROM_EMAIL}
      - EmailSettings__UserName=${EMAIL_USERNAME}
      - EmailSettings__Password=${EMAIL_PASSWORD}
      - EmailSettings__EnableSsl=true
      - EmailSettings__DefaultStrategy=Direct
    ports:
      - "127.0.0.1:8081:80" # Localhost-only; Nginx reverse-proxies api-staging.qalam.net.sa
    volumes:
      - staging_app_logs:/app/Logs
    depends_on:
      rabbitmq:
        condition: service_healthy
      messaging-api:
        # service_started, not service_healthy — backend-api connects to SQL itself and doesn't need
        # messaging-api fully healthy to come up. messaging-api still has its own healthcheck for observability;
        # this just stops it from blocking the deploy when its first-boot migration retries take 60-120s.
        condition: service_started
    networks:
      - qalam-staging-network
    restart: unless-stopped

volumes:
  staging_rabbitmq_data:
  staging_app_logs:

networks:
  qalam-staging-network:
    driver: bridge
