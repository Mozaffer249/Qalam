# Local-dev override — auto-merged by `docker compose up` when this file sits next to docker-compose.yml.
# Production deploys use `docker compose -f docker-compose.yml --env-file .env up` (single file flag),
# which IGNORES this override. Safe to commit.
#
# What this override does:
#   1. Adds a containerized SQL Server so the laptop doesn't need a native install.
#   2. Forces qalam-api + messaging-api to wait for SQL Server's healthcheck.
#   3. Drops VPS-only frontend services (admin/teacher build contexts live under /opt/... on the server).
#      To test locally, clone the repos and set ADMIN_APP_PATH / TEACHER_APP_PATH in .env, then
#      remove the `profiles: ["never"]` blocks below for the service you want.

services:
  sqlserver:
    # Azure SQL Edge — Microsoft's SQL Server flavor that runs natively on linux/arm64
    # (the official mssql/server image is x86_64 only and fails on Apple Silicon).
    # Supports EF Core migrations + all SQL the app uses. Production keeps using
    # full SQL Server on the ECS host; this is laptop-only.
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: qalam-sqlserver-local
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD:-LocalDev@2026}
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - qalam-network
    # No healthcheck — SQL Edge image lacks bash + sqlcmd + curl, and writing a probe
    # in /bin/ash is fiddly. EF Core's own connection retry handles SQL not-ready races
    # on app startup, so depends_on: service_started below is sufficient.

  messaging-api:
    environment:
      # Set ASPNETCORE_ENVIRONMENT=Development in .env.local for test OTP (1234) and verbose logs.
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    depends_on:
      sqlserver:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  qalam-api:
    environment:
      # Development unlocks test OTP 1234 and /Api/Test/FileUploadTest/upload (404 in Production).
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    depends_on:
      sqlserver:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      messaging-api:
        condition: service_started

  # Disable the admin service for local dev (context path doesn't exist on the laptop).
  # To re-enable: clone https://github.com/yassin-khalid/qalam-admin.git to ~/qalam-admin
  # and replace this block with:
  #   qalam-admin:
  #     build:
  #       context: /Users/muzafarragab/qalam-admin

  qalam-admin:
    profiles: ["never"]   # `profiles` not in active profile → service is skipped

  qalam-teacher:
    profiles: ["never"]

volumes:
  sqlserver_data:
