name: qalam-platform

x-docker-logging: &docker-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─────────────── RabbitMQ Message Broker ───────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: qalam-rabbitmq
    logging: *docker-logging
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-qalam}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - qalam-network
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q check_port_connectivity
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 20s

  # ─────────────── Messaging API ───────────────
  messaging-api:
    build:
      context: .
      dockerfile: Qalam.MessagingApi/Dockerfile
    image: qalam-messaging-api:latest
    container_name: qalam-messaging-api
    logging: *docker-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__MessagingDb=${DB_CONNECTION_STRING}
      - RabbitMQSettings__HostName=rabbitmq
      - RabbitMQSettings__Port=5672
      - RabbitMQSettings__UserName=${RABBITMQ_USER:-qalam}
      - RabbitMQSettings__Password=${RABBITMQ_PASS}
      - RabbitMQSettings__VirtualHost=/
      - RabbitMQSettings__EmailQueueName=email-queue
      - RabbitMQSettings__SmsQueueName=sms-queue
      - RabbitMQSettings__PushQueueName=push-queue
      - RabbitMQSettings__TeacherDocUploadQueueName=teacher-doc-upload-queue
      - RabbitMQSettings__ProfilePicUploadQueueName=profile-pic-upload-queue
      - RabbitMQSettings__OpenSessionRequestAttachmentUploadQueueName=open-session-request-attachment-upload-queue
      - RabbitMQSettings__TeacherContentFileUploadQueueName=teacher-content-file-upload-queue
      - EmailSettings__Host=${EMAIL_HOST}
      - EmailSettings__Port=${EMAIL_PORT:-465}
      - EmailSettings__FromName=${EMAIL_FROM_NAME}
      - EmailSettings__FromEmail=${EMAIL_FROM_EMAIL}
      - EmailSettings__UserName=${EMAIL_USERNAME}
      - EmailSettings__Password=${EMAIL_PASSWORD}
      - EmailSettings__EnableSsl=true
      - EmailSettings__SecureSocketMode=${EMAIL_SECURE_SOCKET_MODE:-SslOnConnect}
      - EmailSettings__DefaultStrategy=Queued
      - SmsSettings__AccountSid=${TWILIO_ACCOUNT_SID:-}
      - SmsSettings__AuthToken=${TWILIO_AUTH_TOKEN:-}
      - SmsSettings__FromNumber=${TWILIO_FROM_NUMBER:-}
      - PushNotificationSettings__ServiceAccountKeyPath=${FIREBASE_KEY_PATH:-}
      - PushNotificationSettings__ProjectId=${FIREBASE_PROJECT_ID:-}
      - OssSettings__AccessKeyId=${OSS_ACCESS_KEY_ID:-}
      - OssSettings__AccessKeySecret=${OSS_ACCESS_KEY_SECRET:-}
      - OssSettings__BucketName=${OSS_BUCKET:-auth-and-identities-certificates}
      - OssSettings__Region=${OSS_REGION:-me-central-1}
      - OssSettings__Endpoint=${OSS_ENDPOINT:-https://oss-me-central-1-internal.aliyuncs.com}
      - OssSettings__PublicBaseUrl=${OSS_PUBLIC_BASE_URL:-https://auth-and-identities-certificates.oss-me-central-1.aliyuncs.com}
      - OssSettings__UseInternalEndpoint=${OSS_USE_INTERNAL_ENDPOINT:-true}
      - OssSettings__EcsRoleName=${OSS_ECS_ROLE_NAME:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - qalam-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/messaging/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s

  # ─────────────── Qalam Backend API ───────────────
  qalam-api:
    build:
      context: .
      dockerfile: Qalam.Api/Dockerfile
    image: qalam-backend-api:latest
    container_name: qalam-backend-api
    logging: *docker-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__dbcontext=${DB_CONNECTION_STRING}
      - MIGRATE_ON_STARTUP=${MIGRATE_ON_STARTUP:-false}
      - SEED_DEFAULT_ADMIN=${SEED_DEFAULT_ADMIN:-false}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}
      - EncryptionSettings__Key=${ENCRYPTION_KEY}
      - jwtSettings__Secret=${JWT_SECRET}
      - jwtSettings__Issuer=${JWT_ISSUER:-QalamProject}
      - jwtSettings__Audience=${JWT_AUDIENCE:-QalamProjectUsers}
      - jwtSettings__AccessTokenExpireDate=60
      - jwtSettings__RefreshTokenExpireDate=43200
      - jwtSettings__ValidateIssuer=true
      - jwtSettings__ValidateAudience=true
      - jwtSettings__ValidateLifeTime=true
      - jwtSettings__ValidateIssuerSigningKey=true
      - MessagingApi__BaseUrl=http://messaging-api
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS:-http://localhost:8090,http://localhost:8091,http://localhost:3005,http://localhost:3000,http://localhost:3001,http://localhost:4200}
      - PlatformSettings__WebAppBaseUrl=${PLATFORM_WEB_APP_BASE_URL:-https://qalam.net.sa/}
      - RabbitMQSettings__HostName=rabbitmq
      - RabbitMQSettings__Port=5672
      - RabbitMQSettings__UserName=${RABBITMQ_USER:-qalam}
      - RabbitMQSettings__Password=${RABBITMQ_PASS}
      - RabbitMQSettings__VirtualHost=/
      - RabbitMQSettings__EmailQueueName=email-queue
      - RabbitMQSettings__SmsQueueName=sms-queue
      - RabbitMQSettings__PushQueueName=push-queue
      - RabbitMQSettings__TeacherDocUploadQueueName=teacher-doc-upload-queue
      - RabbitMQSettings__ProfilePicUploadQueueName=profile-pic-upload-queue
      - RabbitMQSettings__OpenSessionRequestAttachmentUploadQueueName=open-session-request-attachment-upload-queue
      - RabbitMQSettings__TeacherContentFileUploadQueueName=teacher-content-file-upload-queue
    ports:
      - "8080:80"
    volumes:
      - app_logs:/app/Logs
    depends_on:
      rabbitmq:
        condition: service_healthy
      messaging-api:
        condition: service_started
    networks:
      - qalam-network
    restart: unless-stopped

  # ─────────────── Admin Frontend (Next.js) ───────────────
  # Source lives in the apps/admin git submodule. Set ADMIN_APP_PATH only when
  # building from a path outside the monorepo (e.g. legacy /opt/qalam-admin).
  qalam-admin:
    build:
      context: ${ADMIN_APP_PATH:-./apps/admin}
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${ADMIN_API_URL:-https://api.qalam.net.sa}
    image: qalam-admin:latest
    container_name: qalam-admin
    logging: *docker-logging
    ports:
      - "127.0.0.1:8090:3000"
    networks:
      - qalam-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  # ─────────────── Teacher Frontend (Vite + TanStack Start) ───────────────
  # Source lives in the apps/teacher git submodule. Set TEACHER_APP_PATH only when
  # building from a path outside the monorepo (e.g. legacy /opt/qalam-teacher).
  qalam-teacher:
    build:
      context: ${TEACHER_APP_PATH:-./apps/teacher}
      dockerfile: Dockerfile
      args:
        MODE: ${TEACHER_BUILD_MODE:-production}
        VITE_API_URL: ${TEACHER_API_URL:-https://api.qalam.net.sa}
    image: qalam-teacher:latest
    container_name: qalam-teacher
    logging: *docker-logging
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    ports:
      - "127.0.0.1:8091:3000"
    networks:
      - qalam-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  rabbitmq_data:
  app_logs:

networks:
  qalam-network:
    driver: bridge
